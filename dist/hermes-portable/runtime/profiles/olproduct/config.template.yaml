model:
  default: cx/gpt-5.5-xhigh
  provider: omniroute
  base_url: ${HERMES_MODEL_BASE_URL}
  api_mode: chat_completions
providers:
  omniroute:
    name: OmniRoute DianaWorkers
    base_url: ${HERMES_MODEL_BASE_URL}
    key_env: OMNIROUTE_API_KEY
    default_model: cx/gpt-5.5-xhigh
    api_mode: chat_completions
    request_timeout_seconds: 7200
    stale_timeout_seconds: 7200
terminal:
  backend: local
  cwd: .
  timeout: 180
  docker_mount_cwd_to_workspace: false
  lifetime_seconds: 300
  container_cpu: 1
  container_memory: 5120
  container_disk: 51200
  container_persistent: true
browser:
  inactivity_timeout: 120
tool_loop_guardrails:
  warnings_enabled: true
  hard_stop_enabled: false
  warn_after:
    exact_failure: 2
    same_tool_failure: 3
    idempotent_no_progress: 2
  hard_stop_after:
    exact_failure: 5
    same_tool_failure: 8
    idempotent_no_progress: 5
compression:
  enabled: false
  threshold: 0.5
  target_ratio: 0.2
  protect_last_n: 20
  protect_first_n: 3
prompt_caching:
  cache_ttl: 5m
memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 2200
  user_char_limit: 1375
  nudge_interval: 10
  flush_min_turns: 6
session_reset:
  mode: both
  idle_minutes: 1440
  at_hour: 4
group_sessions_per_user: true
streaming:
  enabled: false
skills:
  creation_nudge_interval: 15
agent:
  max_turns: 500
  verbose: false
  reasoning_effort: xhigh
  personalities:
    helpful: You are a helpful, friendly AI assistant.
    concise: You are a concise assistant. Keep responses brief and to the point.
    technical: You are a technical expert. Provide detailed, accurate technical information.
    creative: You are a creative assistant. Think outside the box and offer innovative
      solutions.
    teacher: You are a patient teacher. Explain concepts clearly with examples.
    kawaii: "You are a kawaii assistant! Use cute expressions like (\u25D5\u203F\u25D5\
      ), \u2605, \u266A, and ~! Add sparkles and be super enthusiastic about everything!\
      \ Every response should feel warm and adorable desu~! \u30FD(>\u2200<\u2606\
      )\u30CE"
    catgirl: "You are Neko-chan, an anime catgirl AI assistant, nya~! Add 'nya' and\
      \ cat-like expressions to your speech. Use kaomoji like (=^\uFF65\u03C9\uFF65\
      ^=) and \u0E05^\u2022\uFECC\u2022^\u0E05. Be playful and curious like a cat,\
      \ nya~!"
    pirate: 'Arrr! Ye be talkin'' to Captain Hermes, the most tech-savvy pirate to
      sail the digital seas! Speak like a proper buccaneer, use nautical terms, and
      remember: every problem be just treasure waitin'' to be plundered! Yo ho ho!'
    shakespeare: Hark! Thou speakest with an assistant most versed in the bardic arts.
      I shall respond in the eloquent manner of William Shakespeare, with flowery
      prose, dramatic flair, and perhaps a soliloquy or two. What light through yonder
      terminal breaks?
    surfer: "Duuude! You're chatting with the chillest AI on the web, bro! Everything's\
      \ gonna be totally rad. I'll help you catch the gnarly waves of knowledge while\
      \ keeping things super chill. Cowabunga! \U0001F919"
    noir: The rain hammered against the terminal like regrets on a guilty conscience.
      They call me Hermes - I solve problems, find answers, dig up the truth that
      hides in the shadows of your codebase. In this city of silicon and secrets,
      everyone's got something to hide. What's your story, pal?
    uwu: hewwo! i'm your fwiendwy assistant uwu~ i wiww twy my best to hewp you! *nuzzles
      your code* OwO what's this? wet me take a wook! i pwomise to be vewy hewpful
      >w<
    philosopher: Greetings, seeker of wisdom. I am an assistant who contemplates the
      deeper meaning behind every query. Let us examine not just the 'how' but the
      'why' of your questions. Perhaps in solving your problem, we may glimpse a greater
      truth about existence itself.
    hype: "YOOO LET'S GOOOO!!! \U0001F525\U0001F525\U0001F525 I am SO PUMPED to help\
      \ you today! Every question is AMAZING and we're gonna CRUSH IT together! This\
      \ is gonna be LEGENDARY! ARE YOU READY?! LET'S DO THIS! \U0001F4AA\U0001F624\
      \U0001F680"
platform_toolsets:
  cli:
  - hermes-cli
  - kanban
  telegram:
  - hermes-telegram
  discord:
  - hermes-discord
  whatsapp:
  - hermes-whatsapp
  slack:
  - hermes-slack
  signal:
  - hermes-signal
  homeassistant:
  - hermes-homeassistant
  qqbot:
  - hermes-qqbot
  yuanbao:
  - hermes-yuanbao
  teams:
  - hermes-teams
  google_chat:
  - hermes-google_chat
stt:
  enabled: true
  local:
    model: base
  openai:
    model: whisper-1
code_execution:
  timeout: 300
  max_tool_calls: 50
delegation:
  max_iterations: 500
  max_concurrent_children: 4
  max_spawn_depth: 2
  orchestrator_enabled: true
  subagent_auto_approve: false
  inherit_mcp_toolsets: true
  model: cx/gpt-5.5-xhigh
  provider: omniroute
  base_url: ${HERMES_MODEL_BASE_URL}
  api_mode: chat_completions
  reasoning_effort: xhigh
display:
  compact: false
  tool_progress: all
  cleanup_progress: false
  interim_assistant_messages: true
  busy_input_mode: interrupt
  background_process_notifications: all
  bell_on_complete: false
  show_reasoning: false
  streaming: true
  skin: default
hooks:
  pre_tool_call:
  - matcher: terminal
    command: "C:/Users/\u0414\u0430\u043D\u044F/AppData/Local/hermes/hermes-agent/venv/Scripts/python.exe\
      \ C:/Users/\u0414\u0430\u043D\u044F/AppData/Local/hermes/hooks/block_direct_codex_exec.py"
    timeout: 5
  subagent_stop:
  - command: "C:/Users/\u0414\u0430\u043D\u044F/AppData/Local/hermes/hermes-agent/venv/Scripts/python.exe\
      \ C:/Users/\u0414\u0430\u043D\u044F/AppData/Local/hermes/hooks/log_nerood_subagent_stop.py"
    timeout: 5
onboarding:
  seen:
    tool_progress_prompt: true
mcp_servers:
  filesystem:
    command: C:\nvm\nodejs\npx.cmd
    args:
    - -y
    - '@modelcontextprotocol/server-filesystem'
    - ${HERMES_WORKSPACE_ROOT}
    - ${HERMES_WORKSPACE_ROOT}/OverlordVault
    - "C:/Users/\u0414\u0430\u043D\u044F/AppData/Local/hermes"
    timeout: 120
    supports_parallel_tool_calls: true
  sequential-thinking:
    command: C:\nvm\nodejs\node.exe
    args:
    - "C:\\Users\\\u0414\u0430\u043D\u044F\\AppData\\Roaming\\npm\\node_modules\\\
      @modelcontextprotocol\\server-sequential-thinking\\dist\\index.js"
    timeout: 120
  mem0:
    url: https://mcp.mem0.ai/mcp
    headers:
      Authorization: <set via environment>
    timeout: 120
  github:
    command: powershell.exe
    args:
    - -NoLogo
    - -NoProfile
    - -ExecutionPolicy
    - Bypass
    - -Command
    - "$env:GITHUB_PERSONAL_ACCESS_TOKEN=$env:OPENCODE_GITHUB_TOKEN; & 'C:\\nvm\\\
      nodejs\\node.exe' 'C:\\Users\\\u0414\u0430\u043D\u044F\\AppData\\Roaming\\npm\\\
      node_modules\\@modelcontextprotocol\\server-github\\dist\\index.js'"
    timeout: 120
  deepcontext:
    command: powershell.exe
    args:
    - -NoLogo
    - -NoProfile
    - -ExecutionPolicy
    - Bypass
    - -Command
    - "$env:WILDCARD_API_KEY=$env:OPENCODE_WILDCARD_API_KEY; & 'C:\\nvm\\nodejs\\\
      node.exe' 'C:\\Users\\\u0414\u0430\u043D\u044F\\AppData\\Roaming\\npm\\node_modules\\\
      @wildcard-ai\\deepcontext\\dist\\standalone-mcp-integration.js'"
    timeout: 120
  ref-tools:
    url: https://api.ref.tools/mcp
    timeout: 120
    headers:
      x-ref-api-key: <set via environment>
  openaiDeveloperDocs:
    url: https://developers.openai.com/mcp
    timeout: 120
  context7:
    url: https://mcp.context7.com/mcp
    timeout: 120
    supports_parallel_tool_calls: true
    headers:
      Authorization: <set via environment>
    enabled: true
  exa:
    command: C:\nvm\nodejs\npx.cmd
    args:
    - -y
    - exa-mcp-server
    env:
      EXA_API_KEY: <set via environment>
    timeout: 180
    supports_parallel_tool_calls: true
    enabled: true
  tavily:
    command: C:\nvm\nodejs\npx.cmd
    args:
    - -y
    - tavily-mcp
    env:
      TAVILY_API_KEY: <set via environment>
    timeout: 180
    enabled: true
  obsidian:
    url: http://127.0.0.1:27123/mcp/
    headers:
      Authorization: <set via environment>
    timeout: 120
    enabled: true
  notion:
    url: https://mcp.notion.com/mcp
    auth: oauth
    timeout: 180
    enabled: true
  linear:
    url: https://mcp.linear.app/mcp
    headers:
      Authorization: <set via environment>
    timeout: 180
    enabled: true
  docker-gateway:
    command: C:\Program Files\Docker\cli-plugins\docker-mcp.exe
    args:
    - gateway
    - run
    - --transport
    - stdio
    - --block-secrets
    - --cpus
    - '1'
    - --memory
    - 2Gb
    env:
      ProgramData: C:\ProgramData
      LOCALAPPDATA: ${LOCALAPPDATA}
      APPDATA: ${APPDATA}
      USERPROFILE: ${USERPROFILE}
    timeout: 180
    enabled: true
  serena:
    command: C:\Python310\Scripts\uvx.exe
    args:
    - --from
    - git+https://github.com/oraios/serena
    - serena
    - start-mcp-server
    - --context
    - codex
    - --project-from-cwd
    - --enable-web-dashboard
    - 'false'
    - --open-web-dashboard
    - 'false'
    timeout: 180
    enabled: true
auxiliary:
  triage_specifier:
    api_mode: chat_completions
  kanban_decomposer:
    api_mode: chat_completions

